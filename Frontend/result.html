<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scan Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Montserrat:wght@600&display=swap"
        rel="stylesheet">
</head>

<body style="margin:0;background:#070337;color:#ffffff;font-family:'Roboto',sans-serif;text-align:center;">
    <div style="padding:32px 16px;">
        <h1 style="font-family:'Montserrat',sans-serif;margin-bottom:6px;">Scan Result</h1>
        <p style="font-size:16px;color:{MSG_COLOR};font-weight:700;margin-top:0;">{MSG_TEXT}</p>

        <div
            style="margin:16px auto;max-width:820px;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:12px;">
            <img src="{IMAGE_URL}" style="width:100%;height:auto;border-radius:10px;" />
        </div>

        <a href="/"
            style="display:inline-block;margin-top:14px;padding:9px 16px;background:linear-gradient(90deg,#27f3ff,#5a6bff);color:#0a0a0a;border-radius:10px;text-decoration:none;font-weight:700;">
            Run Another Scan
        </a>
    </div>
</body>

</html>
