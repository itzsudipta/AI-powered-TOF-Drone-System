<!DOCTYPE html>
<html>
<head>
    <title>High-Precision Victim Detection</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9;">
    <h2>Upload Camera Frame (YOLOv8 + Sensor Scan)</h2>
    
    <form action="/" method="POST" enctype="multipart/form-data" style="margin-top: 20px;">
        <input type="file" name="image_file" accept="image/*" required style="font-size: 16px;">
        <br><br>
        <button type="submit" style="padding: 12px 24px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Run High-Precision Scan
        </button>
    </form>
</body>
</html>
