<!DOCTYPE html>
<html>
<head>
    <title>Scan Results</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9;">
    
    {% if victim_found %}
        <h1 style="color: #dc3545;">ALERT: Confirmed Victim(s) Detected!</h1>
        <p>YOLO visual shape and Random Forest sensor signatures match.</p>
    {% else %}
        <h1 style="color: #28a745;">Clear: No Victims Verified.</h1>
        <p>No shapes detected, or sensor data rejected the visual shapes.</p>
    {% endif %}

    <img src="{{ image_url }}" alt="Scanned Image" style="max-width: 900px; border: 4px solid #333; margin-top: 20px; border-radius: 8px;">
    
    <br><br>
    <a href="/" style="display: inline-block; padding: 10px 20px; background-color: #333; color: white; text-decoration: none; margin-top: 20px; border-radius: 5px;">
        Scan Another Frame
    </a>
</body>
</html>
