name: Deploy Frontend to S3

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::646770357104:role/SystemAdmin
          aws-region: us-east-1

      - name: List files
        run: ls -la

      - name: Sync to S3
        run: aws s3 sync ./frontend s3://aipoweredtofsystem --delete
